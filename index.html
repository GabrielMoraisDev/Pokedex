<script>

function verificarResolucao(imagem) {
        
        var img = new Image();
  
        img.src = imagem.src;
  
        img.onload = function() {
  
            var pok = document.getElementById("pokemon");

          if (img.width >= 70 && img.height >= 70) {

            if(pok.classList.contains("h-5-05")){
                replace(0, 'pokemon', 'h-5-05', 'h-7');
                replace(0, 'pokemon', 'mg-top-2', 'mg-top-1-02')
            }else if(pok.classList.contains("h-4")){
                replace(0, 'pokemon', 'h-4', 'h-7');
                replace(0, 'pokemon', 'mg-top-2-05', 'mg-top-1-02')
            }
        
          }

          if (img.width >= 50 && img.height >= 50) {

            if(pok.classList.contains("h-7")){
                replace(0, 'pokemon', 'h-7', 'h-5-05');
                replace(0, 'pokemon', 'mg-top-1-02', 'mg-top-2')
            }else if(pok.classList.contains("h-4")){
                replace(0, 'pokemon', 'h-4', 'h-5-05');
                replace(0, 'pokemon', 'mg-top-2-05', 'mg-top-2')
            }
            
          }else{
            if(pok.classList.contains("h-7")){
                replace(0, 'pokemon', 'h-7', 'h-4');
                replace(0, 'pokemon', 'mg-top-1-02', 'mg-top-2-05')
            }else if(pok.classList.contains("h-5-05")){
                replace(0, 'pokemon', 'h-5-05', 'h-4');
                replace(0, 'pokemon', 'mg-top-2', 'mg-top-2-05')
            }
          }

        };
      }

      function open_pokedex(){
        replace(0, 'shadoly', 'w-26', 'w-46');
        replace(0.95, 'shadoly', 'mg-left-16-05', 'mg-left-7');
        replace(1, 'divfundo', 'op-02', 'op-07');
        replace(0, 'c', 'w-35', 'w-1'); replace(0.15, 'c', 'op-1', 'op-0'); replace(0, 'c', 'mg-left-0', 'mg-left-22');
        replace(2, 'active-right', 'op-0', 'op-1');
        replace(0.3, 't', 'mg-left-0', 'mg-left-22'); replace(0, 't', 'none', 'block'); replace(0.3, 't', 'w-1', 'w-35');
        replace(1, 'pt1', 'mg-right-0', 'mg-right-20');replace(1, 'pt2', 'mg-right-0', 'mg-right-20');replace(0, 'pt3', 'mg-right-0', 'mg-right-20');
        replace(0, 'pt4', 'mg-right-0', 'mg-right-20');replace(0, 'pt5', 'mg-right-0', 'mg-right-20');replace(0, 'pt6', 'mg-right-0', 'mg-right-20');
        replace(0, 'pt7', 'mg-right-0', 'mg-right-20');replace(0, 'pt8', 'mg-right-0', 'mg-right-20');replace(0, 'pt9', 'mg-right-0', 'mg-right-20');
        replace(0, 'pt10', 'mg-right-0', 'mg-right-20');replace(0, 'pt11', 'mg-right-0', 'mg-right-20');replace(0, 'pt12', 'mg-right-0', 'mg-right-20');
        replace(0, 'pt13', 'mg-right-0', 'mg-right-20');replace(0, 'pt14', 'mg-right-0', 'mg-right-20');replace(0, 'pt15', 'mg-right-0', 'mg-right-20');
        replace(1.5, 'pt3', 'op-0', 'op-1');
        replace(1.8, 'pt4', 'op-0', 'op-1');
        replace(2, 'pt5', 'op-0', 'op-1');
        replace(2.2, 'pt6', 'op-0', 'op-1');
        replace(1.5, 'pt7', 'op-0', 'op-1');
        replace(1.6, 'pt8', 'op-0', 'op-1');
        replace(1.7, 'pt9', 'op-0', 'op-1');
        replace(1.5, 'pt10', 'op-0', 'op-1');
        replace(2, 'pt11', 'op-0', 'op-1');
        replace(1.9, 'pt12', 'op-0', 'op-1');
        replace(1.5, 'pt13', 'op-0', 'op-1');
        replace(2.2, 'pt14', 'op-0', 'op-1');
        replace(1.7, 'pt15', 'op-0', 'op-1');
        replace(1, 't', 'mg-right--22', 'mg-right--2');
        replace(1, 'backer', 'mg-left-3-05', 'mg-left--6-05');
        replace(1, 'next', 'mg-left-3-05', 'mg-left--6-05');
        replace(1, 'bg-base', 'mg-left--2', 'mg-left--12');
        replace(2.2, 'pokemon', 'op-0', 'op-1');
        replace(1.6, 'bg-base2', 'op-0', 'op-1');
        replace(1.8, 'bg-base', 'op-1', 'op-0');
        replace(1.8, 'rays', 'op-0', 'op-1');
        replace(2, 'name', 'op-0', 'op-1');
        replace(2, 'number', 'op-0', 'op-1');
        replace(2, 'poketype1', 'op-0', 'op-1');
        replace(2, 'poketype2', 'op-0', 'op-1');
        replace(2, 'btn-mobile', 'op-0', 'op-1');
        replace(2, 'btn-mobile2', 'op-0', 'op-1');
    }

document.addEventListener("keydown", function(event) {
    if (event.key === "ArrowDown") {
        backer();
    } else if (event.key === "ArrowUp") {
        next();
    } else if (event.key === "ArrowLeft") {
        backer();
    } else if (event.key === "ArrowRight") {
        next();
    } else if (event.key === "Enter") {
        open_pokedex();
    }else if (event.key === " ") {
        open_pokedex();
    }});

    var imagemAtual = 1;

    function next() {
        var numr = document.getElementById("number");
        var nm = document.getElementById("name");
        var type1 = document.getElementById("poketype1");
        var type2 = document.getElementById("poketype2");
        var imgElement = document.getElementById('pokemon');
        var imgElement2 = document.getElementById('pokemon2');

        if (imagemAtual == 649) {
            imagemAtual = 1;
        } else {
            imagemAtual++;
        }
        numr.innerHTML = imagemAtual;

    fetch('https://pokeapi.co/api/v2/pokemon/' + imagemAtual)
        .then(response => response.json())
        .then(data => {
            var imgbg = document.getElementById('pokeimgbg');
            var poketype = data.types[0].type.name;
            var pokeability = data.abilities[0].ability.name;
            var pokenome = data.forms[0].name;

            nm.innerHTML = pokenome.charAt(0).toUpperCase() + pokenome.slice(1);
            type1.innerHTML = poketype.charAt(0).toUpperCase() + poketype.slice(1);

            if (data.types.length > 1) {
                var poketype2 = data.types[1].type.name;
                type2.innerHTML = poketype2.charAt(0).toUpperCase() + poketype2.slice(1);
            }else{
                type2.innerHTML = " ";
            }

        })
        .catch(error => console.error('Erro ao obter dados da API:', error));

        imgElement.src = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/' + imagemAtual + '.gif';
        imagemAtual_plus = imagemAtual + 0;
        imgElement2.src = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/' + imagemAtual_plus + '.gif';

        verificarResolucao(imgElement2);
}

function backer() {
    var numr = document.getElementById("number");
    var nm = document.getElementById("name");
    var type1 = document.getElementById("poketype1");
    var type2 = document.getElementById("poketype2");
    var imgElement = document.getElementById('pokemon');
    var imgElement2 = document.getElementById('pokemon2');
    
    if (imagemAtual == 1) {
        imagemAtual = 649;
    } else {
        imagemAtual--;
    }

    numr.innerHTML = imagemAtual;

    fetch('https://pokeapi.co/api/v2/pokemon/' + imagemAtual)
        .then(response => response.json())
        .then(data => {
            var imgbg = document.getElementById('pokeimgbg');
            var poketype = data.types[0].type.name;
            var pokeability = data.abilities[0].ability.name;
            var pokenome = data.forms[0].name;

            nm.innerHTML = pokenome.charAt(0).toUpperCase() + pokenome.slice(1);
            type1.innerHTML = poketype.charAt(0).toUpperCase() + poketype.slice(1);

            if (data.types.length > 1) {
                var poketype2 = data.types[1].type.name;
                type2.innerHTML = poketype2.charAt(0).toUpperCase() + poketype2.slice(1);
            }else{
                type2.innerHTML = " ";
            }

        })
    .catch(error => console.error('Erro ao obter dados da API:', error));

    imgElement.src = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/' + imagemAtual + '.gif';
        imagemAtual_plus = imagemAtual + 0;
    imgElement2.src = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/' + imagemAtual_plus + '.gif';

    verificarResolucao(imgElement2);
}

function btn_left(){
    backer(); replace(0, 'll', 'block', 'no-click'); replace(0.5, 'll', 'no-click', 'block');
    replace4(0, 0.1, 'left', 'op-0', 'op-1');
    replace4(0, 0.1, 'll', 'black', 'white');
}

function btn_right(){
    next(); replace(0, 'rr', 'block', 'no-click'); replace(0.5, 'rr', 'no-click', 'block');
    replace4(0, 0.1, 'right', 'op-0', 'op-1');
    replace4(0, 0.1, 'rr', 'black', 'white');
}

function btn_top(){
    next(); replace(0, 'uu', 'block', 'no-click'); replace(0.5, 'uu', 'no-click', 'block');
    replace4(0, 0.1, 'top', 'op-0', 'op-1');
    replace4(0, 0.1, 'uu', 'black', 'white');
}

function btn_bottom(){
    backer(); replace(0, 'dd', 'block', 'no-click'); replace(0.5, 'dd', 'no-click', 'block');
    replace4(0, 0.1, 'bottom', 'op-0', 'op-1');
    replace4(0, 0.1, 'dd', 'black', 'white');
}

</script>

<script>
    function verificarImagem(imgElement, fallbackSrc) {
    imgElement.onerror = function() {
        imgElement.src = fallbackSrc;
    };
}

    var minhaImagem = document.getElementById("pokemon");

    var imagemFallbackSrc = "pokedex/no-found.png";

    verificarImagem(minhaImagem, imagemFallbackSrc);
